{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "foody.secretName" . }}
  labels:
    {{- include "foody.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | required "secrets.betterAuthSecret is required when secrets.existingSecret is not set" | quote }}
  OIDC_CLIENT_ID: {{ .Values.secrets.oidcClientId | required "secrets.oidcClientId is required when secrets.existingSecret is not set" | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | required "secrets.oidcClientSecret is required when secrets.existingSecret is not set" | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | required "secrets.anthropicApiKey is required when secrets.existingSecret is not set" | quote }}
{{- end }}
